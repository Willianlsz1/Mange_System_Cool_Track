<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>
      CoolTrack Pro - Gest&atilde;o de Climatiza&ccedil;&atilde;o e Refrigera&ccedil;&atilde;o
    </title>
    <meta
      name="description"
      content="Sistema de gest&atilde;o de manuten&ccedil;&atilde;o para t&eacute;cnicos aut&ocirc;nomos de climatiza&ccedil;&atilde;o e refrigera&ccedil;&atilde;o. Registre servi&ccedil;os, gere relat&oacute;rios PDF e assine digitalmente."
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoolTrack" />

    <!-- Ícones -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/assets/styles/base.css" />
    <link rel="stylesheet" href="/src/assets/styles/components.css" />
    <link rel="stylesheet" href="/src/assets/styles/layout.css" />
    <link rel="stylesheet" href="/src/assets/styles/desktop-fonts.css" />
    <link rel="stylesheet" href="/src/assets/styles/theme-premium.css" />
    <link rel="stylesheet" href="/src/assets/styles/ux-polish.css" />
    <link rel="stylesheet" href="/src/assets/styles/landing.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app.js"></script>

    <!-- Registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('[SW] Registrado:', reg.scope))
            .catch((err) => console.warn('[SW] Falha no registro:', err));
        });
      }
    </script>
  </body>
</html>
