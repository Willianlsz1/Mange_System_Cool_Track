<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deploy Checklist</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 36px;
      }

      header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 6px;
      }

      .progress-bar-wrap {
        background: #1e2330;
        border-radius: 999px;
        height: 8px;
        margin-top: 14px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #22d3ee);
        border-radius: 999px;
        transition: width 0.4s ease;
      }

      .progress-label {
        font-size: 0.78rem;
        color: #94a3b8;
        margin-top: 6px;
      }

      .section {
        background: #161b27;
        border: 1px solid #1e2a3a;
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        background: #1a2133;
        border-bottom: 1px solid #1e2a3a;
        cursor: pointer;
        user-select: none;
      }

      .section-header:hover {
        background: #1f2840;
      }

      .section-icon {
        font-size: 1.1rem;
      }

      .section-title {
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
        flex: 1;
      }

      .section-count {
        font-size: 0.75rem;
        color: #64748b;
        background: #0f1117;
        padding: 2px 8px;
        border-radius: 999px;
      }

      .section-count.done {
        color: #34d399;
        background: #064e3b22;
      }

      .item-list {
        padding: 8px 0;
      }

      .item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 20px;
        cursor: pointer;
        transition: background 0.15s;
        border-radius: 0;
      }

      .item:hover {
        background: #1a2133;
      }

      .item input[type='checkbox'] {
        display: none;
      }

      .check-box {
        width: 18px;
        height: 18px;
        min-width: 18px;
        border: 2px solid #334155;
        border-radius: 5px;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        background: transparent;
      }

      .item.checked .check-box {
        background: #6366f1;
        border-color: #6366f1;
      }

      .check-box svg {
        display: none;
        width: 11px;
        height: 11px;
      }

      .item.checked .check-box svg {
        display: block;
      }

      .item-text {
        font-size: 0.88rem;
        color: #cbd5e1;
        line-height: 1.5;
        transition: color 0.2s;
      }

      .item.checked .item-text {
        color: #475569;
        text-decoration: line-through;
      }

      .reset-btn {
        display: block;
        margin: 24px auto 0;
        padding: 10px 28px;
        background: transparent;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #64748b;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .reset-btn:hover {
        border-color: #6366f1;
        color: #a5b4fc;
      }

      .all-done-banner {
        display: none;
        text-align: center;
        padding: 18px;
        background: #064e3b22;
        border: 1px solid #34d39940;
        border-radius: 12px;
        color: #34d399;
        font-size: 0.95rem;
        font-weight: 600;
        margin-top: 24px;
      }

      .all-done-banner.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🚀 Deploy Checklist</h1>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-label" id="progressLabel">0 de 0 itens concluídos</div>
      </header>

      <div id="sections"></div>

      <div class="all-done-banner" id="allDone">
        ✅ Tudo certo! Pode fazer o deploy com segurança.
      </div>
      <button class="reset-btn" onclick="resetAll()">Reiniciar checklist</button>
    </div>

    <script>
      const data = [
        {
          id: 'security',
          icon: '🔐',
          title: 'Security',
          items: [
            'No API keys or secrets in frontend code',
            'Every route checks authentication (audit all endpoints, not just the obvious ones)',
            'HTTPS enforced everywhere, HTTP redirected',
            'CORS locked to your domain — not wildcard',
            'Input validated and sanitized server-side',
            'Rate limiting on auth and sensitive endpoints',
            'Passwords hashed with bcrypt or argon2',
            'Auth tokens have expiry',
            'Sessions invalidated on logout (server-side)',
          ],
        },
        {
          id: 'database',
          icon: '🗄️',
          title: 'Database',
          items: [
            'Backups configured and tested (test restore, not just backup)',
            'Parameterized queries everywhere — no string concatenation',
            'Separate dev and production databases',
            'Connection pooling configured',
            'Migrations in version control, not manual changes',
            'App uses a non-root DB user',
          ],
        },
        {
          id: 'deployment',
          icon: '🌐',
          title: 'Deployment',
          items: [
            'All environment variables set on the production server',
            'SSL certificate installed and valid',
            'Firewall configured (only 80/443 public)',
            'Process manager running (PM2, systemd)',
            'Rollback plan exists',
            'Staging test passed before production deploy',
          ],
        },
        {
          id: 'code',
          icon: '💻',
          title: 'Code',
          items: [
            'No console.logs in production build',
            'Error handling on all async operations',
            'Loading and error states in UI',
            'Pagination on all list endpoints',
            'npm audit run, critical issues resolved',
          ],
        },
      ];

      const state = {};
      const STORAGE_KEY = 'deploy_checklist_v1';

      function load() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) Object.assign(state, JSON.parse(saved));
        } catch (e) {}
      }

      function save() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (e) {}
      }

      function getKey(sectionId, idx) {
        return `${sectionId}_${idx}`;
      }

      function toggleItem(sectionId, idx) {
        const key = getKey(sectionId, idx);
        state[key] = !state[key];
        save();
        render();
      }

      function resetAll() {
        Object.keys(state).forEach((k) => delete state[k]);
        save();
        render();
      }

      function render() {
        const container = document.getElementById('sections');
        container.innerHTML = '';

        let total = 0,
          done = 0;

        data.forEach((section) => {
          const sectionDone = section.items.filter((_, i) => state[getKey(section.id, i)]).length;
          total += section.items.length;
          done += sectionDone;
          const allSectionDone = sectionDone === section.items.length;

          const sec = document.createElement('div');
          sec.className = 'section';

          sec.innerHTML = `
        <div class="section-header">
          <span class="section-icon">${section.icon}</span>
          <span class="section-title">${section.title}</span>
          <span class="section-count ${allSectionDone ? 'done' : ''}">${sectionDone}/${section.items.length}</span>
        </div>
        <div class="item-list">
          ${section.items
            .map((item, idx) => {
              const key = getKey(section.id, idx);
              const checked = !!state[key];
              return `
              <label class="item ${checked ? 'checked' : ''}" onclick="toggleItem('${section.id}', ${idx})">
                <div class="check-box">
                  <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <span class="item-text">${item}</span>
              </label>
            `;
            })
            .join('')}
        </div>
      `;

          container.appendChild(sec);
        });

        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').textContent =
          `${done} de ${total} itens concluídos (${pct}%)`;

        const banner = document.getElementById('allDone');
        banner.classList.toggle('show', done === total && total > 0);
      }

      load();
      render();
    </script>
  </body>
</html>
