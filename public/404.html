<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoolTrack Pro — 404</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 360px;
        width: 100%;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #38bdf8;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 0.95rem;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .home-btn {
        display: block;
        background: #38bdf8;
        color: #0f172a;
        border: none;
        border-radius: 8px;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        text-decoration: none;
        text-align: center;
      }
      .home-btn:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🔍</div>
      <h1>Recurso não encontrado</h1>
      <p>
        O endereço solicitado não existe ou foi removido.<br />
        Volte ao início para continuar.
      </p>
      <a class="home-btn" href="/">Ir para o início</a>
    </div>
  </body>
</html>
