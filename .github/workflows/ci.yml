name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Install, lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        # Usa a versão do @playwright/test instalada via devDeps (hoje 1.59.x).
        # Pinar aqui via `npx playwright@1.55.0` criava mismatch com o
        # @playwright/test do node_modules → ERR_MODULE_NOT_FOUND no runner.
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e:ci
