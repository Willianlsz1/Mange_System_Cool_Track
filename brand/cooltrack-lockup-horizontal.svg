<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" fill="none">
  <defs>
    <linearGradient id="bg-h" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E293B"></stop>
      <stop offset="1" stop-color="#0F172A"></stop>
    </linearGradient>
    <linearGradient id="flake-h" x1="48" y1="32" x2="112" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"></stop>
      <stop offset="0.55" stop-color="#38BDF8"></stop>
      <stop offset="1" stop-color="#0EA5E9"></stop>
    </linearGradient>
    <filter id="glow-h" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <clipPath id="squircle-h">
      <rect x="0" y="0" width="160" height="160" rx="35" ry="35"></rect>
    </clipPath>
  </defs>

  <!-- Ícone (scale do 200x200 original para 160x160) -->
  <g clip-path="url(#squircle-h)">
    <rect width="160" height="160" fill="url(#bg-h)"></rect>
    <circle cx="32" cy="24" r="72" fill="#38BDF8" opacity="0.06"></circle>
    <g transform="scale(0.8)">
      <g opacity="0.7" stroke="#7DD3FC" stroke-width="4.5" stroke-linecap="round" fill="none">
        <path d="M 138 64 A 46 46 0 1 0 138 136"></path>
      </g>
      <g filter="url(#glow-h)" stroke="url(#flake-h)" stroke-width="6.5" stroke-linecap="round" fill="none">
        <g>
          <line x1="100" y1="40" x2="100" y2="160"></line>
          <polyline points="92,50 100,42 108,50"></polyline>
          <polyline points="92,150 100,158 108,150"></polyline>
          <polyline points="88,72 100,84 112,72"></polyline>
          <polyline points="88,128 100,116 112,128"></polyline>
        </g>
        <g transform="rotate(60 100 100)">
          <line x1="100" y1="40" x2="100" y2="160"></line>
          <polyline points="92,50 100,42 108,50"></polyline>
          <polyline points="92,150 100,158 108,150"></polyline>
          <polyline points="88,72 100,84 112,72"></polyline>
          <polyline points="88,128 100,116 112,128"></polyline>
        </g>
        <g transform="rotate(120 100 100)">
          <line x1="100" y1="40" x2="100" y2="160"></line>
          <polyline points="92,50 100,42 108,50"></polyline>
          <polyline points="92,150 100,158 108,150"></polyline>
          <polyline points="88,72 100,84 112,72"></polyline>
          <polyline points="88,128 100,116 112,128"></polyline>
        </g>
      </g>
      <circle cx="100" cy="100" r="5.5" fill="#E0F2FE"></circle>
    </g>
  </g>

  <!-- Wordmark para fundo CLARO -->
  <g font-family="Inter, -apple-system, 'Segoe UI', sans-serif" fill="#0F172A">
    <text x="195" y="92" font-size="52" font-weight="700" letter-spacing="-1.5">CoolTrack</text>
    <text x="502" y="92" font-size="52" font-weight="300" letter-spacing="-1" fill="#0EA5E9">Pro</text>
    <text x="197" y="118" font-size="14" font-weight="500" letter-spacing="3" fill="#64748B">GESTÃO HVAC</text>
  </g>
</svg>
